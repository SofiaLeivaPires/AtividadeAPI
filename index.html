<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="font-sans flex min-h-screen  bg-gray-100 flex-col">
    <div class="max-w-2xl mx-auto w-200 h-65 p-5 border border-gray-700 rounded-xl shadow-md flex flex-col items-center gap-4 mt-10" >
        <h1 class="text-3xl ">Busca de Filmes</h1>
        <input type="text" id="filme" placeholder="Digite um filme para buscar" class="border border-blue-700 rounded-lg px-4 py-2 bg-gray-200 w-full focus:outline-none focus:ring-1 focus:ring-blue-500">
        <button id="botao" class="border border-gray-700 w-full rounded-lg bg-blue-900 text-white px-5 py-2  hover:text-black hover:bg-blue-100 cursor-pointer ">Clique aqui para buscar filmes</button>
        <button id="botaoDescobrir" class="border border-gray-700 w-full rounded-lg bg-blue-900 text-white px-5 py-2  hover:text-black hover:bg-blue-100 cursor-pointer ">Clique aqui para descobrir filmes</button>

    </div>
    <div id="result" class="w-full max-w-8xl mx-auto p-20 grid  lg:grid-cols-3 gap-4 ">
    </div>

</body>
</html>
